version: '3.8'

services:
  ogame-smart-bot:
    image: ogame-agi-ogame-smart-bot:latest
    container_name: ogame-smart-bot
    restart: unless-stopped
    
    environment:
      # OGame Credentials
      - OGAME_USERNAME=TestAgent2026
      - OGAME_PASSWORD=TestAGI2026!
      - OGAME_EMAIL=TestAgent2026@yopmail.com
      - OGAME_UNIVERSE_URL=https://s161-en.ogame.gameforge.com
      - OGAME_UNIVERSE=Scorpius
      
      # AI Configuration (local CLI fallback)
      - GEMINI_API_KEY=local_cli
      
      # Smart Bot Configuration
      - QUICK_CHECK_INTERVAL=60
      - AI_DECISION_INTERVAL=1800
      - MAX_SESSION_TIME=3600
      - STRATEGIC_MODE=conservative
      
      # Resource Thresholds (triggers)
      - METAL_THRESHOLD=50000
      - CRYSTAL_THRESHOLD=25000
      - DEUTERIUM_THRESHOLD=12500
      
      # Browser Settings
      - HEADLESS=true
      - DEBUG=false
      - LOG_LEVEL=INFO
      
      # Safety
      - AUTO_FLEETSAVE=true
      - RISK_TOLERANCE=low
      - SESSION_BREAK_MIN=600
      - SESSION_BREAK_MAX=1800
      - ACTION_DELAY_MIN=3000
      - ACTION_DELAY_MAX=8000
      - RANDOMIZE_BEHAVIOR=true
    
    volumes:
      # Persistent data
      - ogame-bot-data:/app/data
      - ogame-bot-logs:/app/logs
      - ogame-bot-sessions:/app/sessions
    
    # Resource limits (lightweight)
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.2'
    
    # Health monitoring
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/data/bot_state.json || exit 1"]
      interval: 5m
      timeout: 10s
      retries: 2
      start_period: 60s

volumes:
  ogame-bot-data:
  ogame-bot-logs:
  ogame-bot-sessions: