version: '3.8'

services:
  ogame-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: ogame-autonomous-bot
    restart: unless-stopped
    
    environment:
      # OGame Credentials
      - OGAME_USERNAME=${OGAME_USERNAME}
      - OGAME_PASSWORD=${OGAME_PASSWORD}
      - OGAME_UNIVERSE_URL=${OGAME_UNIVERSE_URL}
      
      # AI Configuration
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      
      # Bot Configuration
      - STRATEGIC_MODE=${STRATEGIC_MODE:-balanced}
      - DECISION_INTERVAL=${DECISION_INTERVAL:-300}
      - MAX_CYCLES=${MAX_CYCLES:-0}
      - RISK_TOLERANCE=${RISK_TOLERANCE:-low}
      - AUTO_FLEETSAVE=${AUTO_FLEETSAVE:-true}
      
      # Browser Settings
      - HEADLESS=true
      - BROWSER_PATH=/usr/bin/google-chrome
      
      # Timing & Safety
      - ACTION_DELAY_MIN=3000
      - ACTION_DELAY_MAX=8000
      - RANDOMIZE_BEHAVIOR=true
      
      # Debug
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    
    volumes:
      # Persistent data
      - ./data:/app/data
      - ./logs:/app/logs
      
      # Optional: Knowledge base override
      - ./knowledge:/app/knowledge:ro
      
      # Session persistence
      - bot-sessions:/app/sessions
    
    networks:
      - ogame-net
    
    # Optional: Health monitoring
    ports:
      - "8080:8080"  # Health check endpoint
    
    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Optional: Monitoring dashboard
  ogame-monitor:
    image: nginx:alpine
    container_name: ogame-bot-monitor
    ports:
      - "8090:80"
    volumes:
      - ./logs:/usr/share/nginx/html/logs:ro
      - ./data:/usr/share/nginx/html/data:ro
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ogame-bot
    networks:
      - ogame-net

volumes:
  bot-sessions:

networks:
  ogame-net:
    driver: bridge