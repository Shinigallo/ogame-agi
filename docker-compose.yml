version: '3.8'

services:
  ogame-agent:
    build:
      context: .
      dockerfile: Dockerfile.minimal
    container_name: ogame-agi-minimal
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OGAME_USERNAME=${OGAME_USERNAME}  
      - OGAME_PASSWORD=${OGAME_PASSWORD}
      - OGAME_UNIVERSE_URL=${OGAME_UNIVERSE_URL}
      - OGAME_UNIVERSE=${OGAME_UNIVERSE}
      - DEBUG=${DEBUG:-true}
      - HEADLESS=${HEADLESS:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - RISK_TOLERANCE=${RISK_TOLERANCE:-low}
      - STRATEGY_FOCUS=${STRATEGY_FOCUS:-balanced}
      - GAME_PHASE=${GAME_PHASE:-early}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - ogame-network

networks:
  ogame-network:
    driver: bridge